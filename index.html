      clip-path: polygon(0 0, 100% 0, 0 100%);

    .card-rel { position: relative; overflow: hidden; }

      display: inline-block; padding: 3px 10px 3px 8px;

      clip-path: polygon(0 0, 100% 0, 95% 50%, 100% 100%, 0 100%);

      box-shadow: 0 4px 14px rgba(0,0,0,0.5);
      opacity: 0.55; filter: saturate(1.1) blur(8px);

    .flag-tile::after {
      content: ""; position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.18) 0%, transparent 30%, transparent 70%, rgba(0,0,0,0.18) 100%);

      content: ""; position: absolute; inset: 0;

      content: ""; position: absolute; inset: 0;

      pointer-events: none; z-index: 2;

      border-radius: 50%; font-size: 9px; line-height: 14px; text-align: center;

    .rule-chip {
      background: rgba(15,23,42,0.7); border: 1px solid #1e293b;
      border-radius: 10px; padding: 10px 12px;
      display: flex; align-items: center; gap: 10px;

    .rule-chip .sub { font-size: 10px; color: #64748b; margin-top: 2px; }

    .podium { display: grid; grid-template-columns: 1fr 1.1fr 1fr; gap: 8px; align-items: end; margin-bottom: 20px; }
    .podium-step {
      background: linear-gradient(180deg, #1e293b, #0f172a); border: 1px solid #334155;

    .podium-step .medal { font-size: 30px; margin-bottom: 4px; line-height: 1; }
    .podium-step .p-name { font-family: 'Anton', sans-serif; font-size: 14px; letter-spacing: 0.5px; color: #fff; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .podium-step .pts  { font-family: 'Anton', sans-serif; font-size: 24px; line-height: 1; }
    .podium-step .lbl  { font-size: 9px; letter-spacing: 1.5px; color: rgba(255,255,255,0.55); text-transform: uppercase; }
    .podium-base {

    function calcMatchPoints(prono, result) {
      if (!result || result.home === "" || result.away === "") return 0;
      if (!prono || prono.home === "" || prono.away === "") return 0;
      const ph = parseInt(prono.home), pa = parseInt(prono.away);
      const rh = parseInt(result.home), ra = parseInt(result.away);
      if (ph === rh && pa === ra) return 3;
      if (Math.sign(ph - pa) === Math.sign(rh - ra)) return 1;
      return 0;
    }

    function buildDefaultMatches() {
      const ms = []; let id = 1;
      GROUPS.forEach(g => {
        for (let i = 0; i < 4; i++)
          for (let j = i + 1; j < 4; j++)
            ms.push({ id: id++, group: g.id, home: g.teams[i], away: g.teams[j], result: { home: "", away: "" }, matchDate: "", matchTime: "", venue: "", round: "" });
      });
      return ms;
    }

    function formatDate(dateStr) {
      if (!dateStr) return "";

    createApp({
      setup() {

        const profile      = ref(null);

        const tab               = ref(0);
        const participants      = ref([]);
        const matches           = ref(buildDefaultMatches());

        const bonusPronostics   = ref({});
        const bonusResults      = ref({});
        const jokers            = ref({});
        const activeGroup       = ref("A");
        const activeParticipant = ref(null);

        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
        const writeTimers = {};
        let realtimeChannel = null;

        // ── Permissions ───────────────────────────────────────────────────────
        const myParticipantId = computed(() => profile.value?.participant_id ?? null);
        const canEditProno    = computed(() => activeParticipant.value !== null && activeParticipant.value === myParticipantId.value);
        function isMe(pid) { return pid === myParticipantId.value; }

        // ── Computed ──────────────────────────────────────────────────────────
        const rtColor      = computed(() => rtStatus.value === "connected" ? C.green : C.yellow);
        const groupMatches = computed(() => matches.value.filter(m => m.group === activeGroup.value));

        function calcScore(pid) {
          let total = 0, exactCount = 0;
          matches.value.forEach(m => {
            if (m.result.home === "" || m.result.away === "") return;
            const pts = calcMatchPoints(pronostics.value[pid]?.[m.id], m.result);
            if (pts === 3) exactCount++;
            total += jokers.value[pid] === m.id ? pts * 2 : pts;
          });
          BONUS_TYPES.forEach(b => {
            for (let i = 0; i < b.count; i++) {
              const key = b.id + "_" + i;
              const res = bonusResults.value[key], prono = bonusPronostics.value[pid]?.[key];
              if (res && prono && res.toLowerCase().trim() === prono.toLowerCase().trim()) total += b.points;
            }
          });
          return { total, exactCount };
        }

        const rankings = computed(() =>
          participants.value.map(p => ({ ...p, ...calcScore(p.id) }))
            .sort((a, b) => b.total - a.total || b.exactCount - a.exactCount)
        );

        // ── Style helpers ─────────────────────────────────────────────────────

        const sLabel = { color: C.muted, fontSize: "11px", fontWeight: 600, textTransform: "uppercase", letterSpacing: "1px", marginBottom: "6px", display: "block" };

        function tabStyle(active) {
          return { padding: "10px 16px", background: active ? "#dc2626" : "transparent", color: active ? "#fff" : C.muted, border: "none", borderRadius: "8px 8px 0 0", cursor: "pointer", fontFamily: "'Anton', sans-serif", fontSize: "14px", letterSpacing: "1.2px", textTransform: "uppercase", borderBottom: active ? "3px solid #1e3a8a" : "3px solid transparent" };
        }
        function btnStyle(color) {

        // ── Template helpers ──────────────────────────────────────────────────
        function getProno(pid, matchId)     { return pronostics.value[pid]?.[matchId] || {}; }
        function isJokerMatch(pid, matchId) { return jokers.value[pid] === matchId; }
        function getMatchPts(pid, matchId) {
          const m = matches.value.find(x => x.id === matchId);
          return m ? calcMatchPoints(pronostics.value[pid]?.[m.id], m.result) : 0;
        }
        function ptColor(pts, hasRes) {
          return pts === 3 ? C.green : pts === 1 ? C.yellow : hasRes ? "#ef4444" : C.muted;
        }
        function getBonusProno(pid, key)  { return bonusPronostics.value[pid]?.[key] || ""; }
        function isBonusCorrect(pid, key) {
          const res = bonusResults.value[key], prono = bonusPronostics.value[pid]?.[key];
          return !!(res && prono && res.toLowerCase().trim() === prono.toLowerCase().trim());
        }
        function isBonusWrong(pid, key) {
          const res = bonusResults.value[key], prono = bonusPronostics.value[pid]?.[key];
          return !!(res && prono && res.toLowerCase().trim() !== prono.toLowerCase().trim());
        }
        function matchPtsForRanking(pid) {
          return matches.value.reduce((acc, m) => {
            if (m.result.home === "" || m.result.away === "") return acc;
            const pts = calcMatchPoints(pronostics.value[pid]?.[m.id], m.result);
            return acc + (jokers.value[pid] === m.id ? pts * 2 : pts);
          }, 0);
        }
        function matchesPlayedCount() {
          return matches.value.filter(m => m.result.home !== "" && m.result.away !== "").length;
        }
        function activeParticipantName() {
          return participants.value.find(p => p.id === activeParticipant.value)?.name || "";
        }
        function activeParticipantColor() {
          return participants.value.find(p => p.id === activeParticipant.value)?.color || C.accent;
        }
        function getBonusIcon(id) { return BONUS_ICONS[id] || { icon: "⭐", bg: "linear-gradient(135deg, #6366f1, #4338ca)" }; }

        // ── Flash / debounce ──────────────────────────────────────────────────
        function flash() { saveMsg.value = "✓ Sauvegardé"; setTimeout(() => { saveMsg.value = ""; }, 2000); }
        function debounce(key, fn, delay = 600) {
          if (writeTimers[key]) clearTimeout(writeTimers[key]);
          writeTimers[key] = setTimeout(async () => { await fn(); flash(); }, delay);
        }

        // ── Data actions ──────────────────────────────────────────────────────
        function setProno(pid, matchId, side, val) {
          if (!isMe(pid)) return;
          const cur = pronostics.value;
          pronostics.value = { ...cur, [pid]: { ...cur[pid], [matchId]: { ...(cur[pid]?.[matchId] || {}), [side]: val } } };
          debounce("prono_" + pid + "_" + matchId, async () => {
            const prono = pronostics.value[pid]?.[matchId];
            if (!prono) return;
            await sb.from("pronostics").upsert({ participant_id: pid, match_id: matchId, prono_home: prono.home === "" ? null : parseInt(prono.home), prono_away: prono.away === "" ? null : parseInt(prono.away), is_joker: jokers.value[pid] === matchId }, { onConflict: "participant_id,match_id" });
          });
        }

        function setBonus(pid, bonusId, idx, val) {
          if (!isMe(pid)) return;
          const key = bonusId + "_" + idx;
          bonusPronostics.value = { ...bonusPronostics.value, [pid]: { ...bonusPronostics.value[pid], [key]: val } };
          debounce("bp_" + pid + "_" + key, async () => {
            await sb.from("bonus_pronostics").upsert({ participant_id: pid, bonus_key: key, value: val }, { onConflict: "participant_id,bonus_key" });
          });
        }

        function setBonusResult(bonusId, idx, val) {
          const key = bonusId + "_" + idx;
          bonusResults.value = { ...bonusResults.value, [key]: val };
          debounce("br_" + key, async () => {
            await sb.from("bonus_results").upsert({ bonus_key: key, value: val }, { onConflict: "bonus_key" });
          });
        }

        async function toggleJoker(pid, matchId) {
          if (!isMe(pid)) return;
          const isCurrentJoker = jokers.value[pid] === matchId;
          const oldJokerMatchId = jokers.value[pid];
          jokers.value = { ...jokers.value, [pid]: isCurrentJoker ? null : matchId };
          if (oldJokerMatchId && oldJokerMatchId !== matchId) {
            const oldProno = pronostics.value[pid]?.[oldJokerMatchId] || {};
            await sb.from("pronostics").upsert({ participant_id: pid, match_id: oldJokerMatchId, prono_home: oldProno.home === "" ? null : parseInt(oldProno.home), prono_away: oldProno.away === "" ? null : parseInt(oldProno.away), is_joker: false }, { onConflict: "participant_id,match_id" });
          }
          const prono = pronostics.value[pid]?.[matchId] || {};
          await sb.from("pronostics").upsert({ participant_id: pid, match_id: matchId, prono_home: prono.home === "" ? null : parseInt(prono.home), prono_away: prono.away === "" ? null : parseInt(prono.away), is_joker: !isCurrentJoker }, { onConflict: "participant_id,match_id" });
          flash();
        }

        // ── Auth actions ──────────────────────────────────────────────────────
        async function doRegister() {
          authLoading.value = true; authError.value = "";
          try {
            const username = authUsername.value.trim().toLowerCase().replace(/[^a-z0-9_]/g, "");
            if (username.length < 2) throw new Error("Le nom doit faire au moins 2 caractères (lettres, chiffres, _)");
            if (authPassword.value.length < 6) throw new Error("Le mot de passe doit faire au moins 6 caractères");
            const { data, error } = await sb.auth.signUp({ email: username + "@mfga.app", password: authPassword.value });
            if (error) {
              if (error.message.includes("already registered") || error.message.includes("already exists")) {
                authMode.value = "login";
                throw new Error("Ce nom existe déjà — connecte-toi avec ton mot de passe.");
              }
              if (error.message.includes("rate limit")) throw new Error("Trop de tentatives, réessayez dans quelques minutes");
              throw error;
            }
            if (data.user && !data.session) {
              authMode.value = "login";
              throw new Error("Compte créé — connecte-toi avec ton mot de passe.");
            }
          } catch (e) { authError.value = e.message; } finally { authLoading.value = false; }
        }

        async function doLogin() {
          authLoading.value = true; authError.value = "";
          try {
            const username = authUsername.value.trim().toLowerCase().replace(/[^a-z0-9_]/g, "");
            const { error } = await sb.auth.signInWithPassword({ email: username + "@mfga.app", password: authPassword.value });
            if (error) throw new Error("Nom d'utilisateur ou mot de passe incorrect");
          } catch (e) { authError.value = e.message; } finally { authLoading.value = false; }
        }

        async function doLogout() {
          if (realtimeChannel) { sb.removeChannel(realtimeChannel); realtimeChannel = null; }
          await sb.auth.signOut();
          session.value = null; profile.value = null; loaded.value = false;
          participants.value = []; pronostics.value = {}; bonusPronostics.value = {};
          bonusResults.value = {}; jokers.value = {}; matches.value = buildDefaultMatches();
          tab.value = 0; authUsername.value = ""; authPassword.value = "";
        }

        // ── Data loading ──────────────────────────────────────────────────────
        async function loadData(userId) {
          try {
          let { data: prof } = await sb.from("profiles").select("*").eq("id", userId).single();
          if (!prof) {
            await new Promise(r => setTimeout(r, 900));
            const { data: retry } = await sb.from("profiles").select("*").eq("id", userId).single();
            prof = retry;
          }
          if (!prof) { authError.value = "Profil introuvable. Contactez l'administrateur."; return; }
          profile.value = prof;

          const [{ data: pData }, { data: mData }, { data: prData }, { data: brData }, { data: bpData }] = await Promise.all([
            sb.from("participants").select("*").order("id"),
            sb.from("matches").select("*"),
            sb.from("pronostics").select("*"),
            sb.from("bonus_results").select("*"),
            sb.from("bonus_pronostics").select("*"),
          ]);

          participants.value = (pData || []).map(p => ({ id: p.id, name: p.name, color: p.color }));
          activeParticipant.value = prof.participant_id;

          const matchesMap = {};
          (mData || []).forEach(r => { matchesMap[r.id] = r; });
          matches.value = buildDefaultMatches().map(m => {
            const md = matchesMap[m.id] || {};
            return { ...m,
              result: { home: md.score_home !== null && md.score_home !== undefined ? String(md.score_home) : "", away: md.score_away !== null && md.score_away !== undefined ? String(md.score_away) : "" },
              matchDate: md.match_date || "", matchTime: md.match_time || "", venue: md.venue || "", round: md.round || "",
            };
          });

          const pronos = {}, jkrs = {};
          (prData || []).forEach(p => {
            if (!pronos[p.participant_id]) pronos[p.participant_id] = {};
            pronos[p.participant_id][p.match_id] = { home: p.prono_home !== null ? String(p.prono_home) : "", away: p.prono_away !== null ? String(p.prono_away) : "" };
            if (p.is_joker) jkrs[p.participant_id] = p.match_id;
          });
          pronostics.value = pronos; jokers.value = jkrs;

          const bRes = {};
          (brData || []).forEach(r => { bRes[r.bonus_key] = r.value; });
          bonusResults.value = bRes;

          const bPronos = {};
          (bpData || []).forEach(p => {
            if (!bPronos[p.participant_id]) bPronos[p.participant_id] = {};
            bPronos[p.participant_id][p.bonus_key] = p.value;
          });
          bonusPronostics.value = bPronos;
          loaded.value = true;

          if (realtimeChannel) sb.removeChannel(realtimeChannel);
          realtimeChannel = sb.channel("mfga-rt")
            .on("postgres_changes", { event: "*", schema: "public", table: "participants" }, ({ eventType, new: n, old: o }) => {
              if (eventType === "INSERT") participants.value = participants.value.find(x => x.id === n.id) ? participants.value : [...participants.value, { id: n.id, name: n.name, color: n.color }];
              else if (eventType === "DELETE") participants.value = participants.value.filter(x => x.id !== o.id);
            })
            .on("postgres_changes", { event: "*", schema: "public", table: "matches" }, ({ eventType, new: r }) => {
              if (eventType === "INSERT" || eventType === "UPDATE")
                matches.value = matches.value.map(m => m.id === r.id ? { ...m,
                  result: { home: r.score_home !== null && r.score_home !== undefined ? String(r.score_home) : "", away: r.score_away !== null && r.score_away !== undefined ? String(r.score_away) : "" },
                  matchDate: r.match_date || m.matchDate, matchTime: r.match_time || m.matchTime, venue: r.venue || m.venue, round: r.round || m.round,
                } : m);
            })
            .on("postgres_changes", { event: "*", schema: "public", table: "pronostics" }, ({ eventType, new: p }) => {
              if (eventType === "INSERT" || eventType === "UPDATE") {
                pronostics.value = { ...pronostics.value, [p.participant_id]: { ...pronostics.value[p.participant_id], [p.match_id]: { home: p.prono_home !== null ? String(p.prono_home) : "", away: p.prono_away !== null ? String(p.prono_away) : "" } } };
                jokers.value = (() => { const j = { ...jokers.value }; if (p.is_joker) j[p.participant_id] = p.match_id; else if (j[p.participant_id] === p.match_id) j[p.participant_id] = null; return j; })();
              }
            })
            .on("postgres_changes", { event: "*", schema: "public", table: "bonus_results" }, ({ eventType, new: r }) => {

                      <div style="display: flex; align-items: center; gap: 6px; margin-bottom: 8px">
                        <span :style="{ width: '6px', height: '6px', borderRadius: '50%', background: activeParticipantColor() }"></span>
                        <span :style="{ fontSize: '9px', color: activeParticipantColor(), fontWeight: 700, letterSpacing: '1.2px', textTransform: 'uppercase' }">{{ activeParticipantName() || 'Pronostic' }}</span>
                      </div>
                      <div style="display: flex; align-items: center; gap: 6px; justify-content: center">
                        <input class="score-led" type="number" min="0" max="20" placeholder="–"
                          :style="{ opacity: canEditProno ? 1 : 0.5 }"
                          :disabled="!canEditProno"
                          :value="getProno(activeParticipant, m.id).home ?? ''"
                          @input="setProno(activeParticipant, m.id, 'home', $event.target.value)" />
                        <span style="color: #475569; font-weight: 700; font-size: 22px; font-family: Anton, sans-serif">:</span>
                        <input class="score-led" type="number" min="0" max="20" placeholder="–"
                          :style="{ opacity: canEditProno ? 1 : 0.5 }"
                          :disabled="!canEditProno"
                          :value="getProno(activeParticipant, m.id).away ?? ''"
                          @input="setProno(activeParticipant, m.id, 'away', $event.target.value)" />
                      </div>
                    </div>
                    <!-- Result panel (read-only) -->
                    <div :style="{ background: '#0a0e1a', borderRadius: '10px', padding: '10px 8px', border: '1px solid ' + (m.result.home !== '' && m.result.away !== '' ? '#22c55e44' : C.border), position: 'relative' }">
                      <div style="display: flex; align-items: center; gap: 6px; margin-bottom: 8px">
                        <span :class="m.result.home !== '' && m.result.away !== '' ? 'live-dot' : ''"
                          :style="{ width: '6px', height: '6px', borderRadius: '50%', background: m.result.home !== '' && m.result.away !== '' ? '#22c55e' : '#475569' }"></span>
                        <span :style="{ fontSize: '9px', color: m.result.home !== '' && m.result.away !== '' ? '#22c55e' : '#475569', fontWeight: 700, letterSpacing: '1.2px', textTransform: 'uppercase' }">Résultat final</span>
                      </div>
                      <div style="display: flex; align-items: center; gap: 6px; justify-content: center">
                        <div class="score-led-ro" :style="{ color: m.result.home !== '' ? '#fbbf24' : '#334155' }">{{ m.result.home !== '' ? m.result.home : '–' }}</div>
                        <span style="color: #475569; font-weight: 700; font-size: 22px; font-family: Anton, sans-serif">:</span>
                        <div class="score-led-ro" :style="{ color: m.result.away !== '' ? '#fbbf24' : '#334155' }">{{ m.result.away !== '' ? m.result.away : '–' }}</div>
                      </div>
                    </div>
                  </div>

                  <!-- Footer: joker + result pts -->
                  <div :style="{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: '12px', paddingTop: '10px', borderTop: '1px dashed ' + C.border }">
                    <button v-if="canEditProno"
                      :style="{ background: isJokerMatch(activeParticipant, m.id) ? 'linear-gradient(135deg, #f59e0b, #d97706)' : 'transparent', color: isJokerMatch(activeParticipant, m.id) ? '#0a0e1a' : '#94a3b8', border: '1px solid ' + (isJokerMatch(activeParticipant, m.id) ? '#f59e0b' : C.border), borderRadius: '999px', padding: '5px 12px', cursor: 'pointer', fontFamily: 'Anton, sans-serif', fontSize: '11px', letterSpacing: '1px', display: 'flex', alignItems: 'center', gap: '4px' }"
                      @click="toggleJoker(activeParticipant, m.id)">
                      🃏 {{ isJokerMatch(activeParticipant, m.id) ? 'RETIRER JOKER' : 'POSER LE JOKER' }}
                    </button>
                    <div v-else></div>
                    <div v-if="m.result.home !== '' && m.result.away !== ''" style="display: flex; align-items: center; gap: 8px">
                      <span v-if="getMatchPts(activeParticipant, m.id) === 3" style="font-size: 18px">🎯</span>
                      <span v-else-if="getMatchPts(activeParticipant, m.id) === 1" style="font-size: 16px">✅</span>
                      <span v-else style="font-size: 16px; opacity: 0.6">❌</span>
                      <span class="anton" :style="{ fontSize: '18px', color: ptColor(getMatchPts(activeParticipant, m.id), true) }">
                        +{{ isJokerMatch(activeParticipant, m.id) ? getMatchPts(activeParticipant, m.id) * 2 : getMatchPts(activeParticipant, m.id) }} pts
                      </span>
                      <span v-if="isJokerMatch(activeParticipant, m.id) && getMatchPts(activeParticipant, m.id) > 0" style="font-size: 11px; color: #f59e0b; font-family: Anton, sans-serif">({{ getMatchPts(activeParticipant, m.id) }}×2)</span>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <!-- TAB 2 — Bonus -->
            <div v-if="tab === 2">
              <div :style="{ ...sCard, marginBottom: '14px', background: '#0a0e1a', border: '1px solid #1e293b', display: 'flex', gap: '12px', alignItems: 'center' }">
                <div style="font-size: 28px; flex-shrink: 0">🎯</div>
                <div>
                  <div class="anton" style="font-size: 14px; color: #fbbf24; letter-spacing: 1px; margin-bottom: 2px">PRONOSTICS BONUS</div>
                  <div :style="{ fontSize: '11px', color: C.muted, lineHeight: 1.5 }">À rendre avant le coup d'envoi. Saisissez les prédictions de chaque joueur, puis entrez les vrais résultats.</div>
                </div>
              </div>

              <div v-for="b in BONUS_TYPES" :key="b.id" class="card-rel" :style="{ ...sCard, padding: '0', overflow: 'hidden' }">
                <!-- Bonus header -->
                <div class="bonus-header" :style="{ background: getBonusIcon(b.id).bg }">
                  <div class="bonus-icon-box" style="background: rgba(255,255,255,0.18)">{{ getBonusIcon(b.id).icon }}</div>
                  <div style="flex: 1; min-width: 0">
                    <div class="anton" style="font-size: 15px; color: #fff; letter-spacing: 0.8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis">{{ b.label }}</div>
                    <div style="font-size: 10px; color: rgba(255,255,255,0.85); margin-top: 2px; letter-spacing: 1px">
                      {{ b.count > 1 ? b.count + ' prédictions' : '1 prédiction' }} · récompense par bonne réponse
                    </div>
                  </div>
                  <div style="background: rgba(0,0,0,0.3); padding: 4px 10px; border-radius: 999px; font-family: Anton, sans-serif; font-size: 13px; color: #fff; letter-spacing: 1px; flex-shrink: 0">
                    +{{ b.points }} PTS
                  </div>
                </div>

                <div style="padding: 0 14px 14px">
                  <template v-for="i in b.count" :key="i">
                    <div :style="{ marginBottom: b.count > 1 && i < b.count ? '16px' : '0', padding: b.count > 1 ? '10px' : '0', background: b.count > 1 ? 'rgba(15,23,42,0.5)' : 'transparent', borderRadius: b.count > 1 ? '8px' : '0', border: b.count > 1 ? '1px solid ' + C.border : 'none', marginTop: b.count > 1 ? '10px' : '10px' }">
                      <div v-if="b.count > 1" class="anton" :style="{ fontSize: '11px', color: C.muted, letterSpacing: '1.5px', marginBottom: '8px' }">★ #{{ i }}</div>
                      <!-- Result input -->
                      <div style="display: flex; gap: 8px; align-items: center; margin-bottom: 8px">
                        <div style="display: flex; align-items: center; gap: 6px; width: 90px; flex-shrink: 0">
                          <span :style="{ width: '8px', height: '8px', borderRadius: '50%', background: bonusResults[b.id + '_' + (i - 1)] ? '#22c55e' : C.muted }"></span>
                          <span :style="{ fontSize: '10px', color: bonusResults[b.id + '_' + (i - 1)] ? '#22c55e' : C.muted, fontWeight: 700, letterSpacing: '1px', textTransform: 'uppercase' }">Résultat</span>
                        </div>
                        <input :style="{ ...sInput, borderColor: bonusResults[b.id + '_' + (i - 1)] ? '#22c55e66' : C.border }"
                          placeholder="À renseigner..."
                          :value="bonusResults[b.id + '_' + (i - 1)] || ''"
                          @input="setBonusResult(b.id, i - 1, $event.target.value)" />
                      </div>
                      <!-- Participant rows -->
                      <div v-for="p in participants" :key="p.id" style="display: flex; gap: 8px; align-items: center; margin-bottom: 6px">
                        <div style="display: flex; align-items: center; gap: 6px; width: 90px; flex-shrink: 0">
                          <div :style="{ width: '22px', height: '22px', borderRadius: '50%', background: 'linear-gradient(135deg, ' + p.color + ', ' + p.color + 'cc)', color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '9px', fontWeight: 700, fontFamily: 'Anton, sans-serif', flexShrink: 0 }">{{ initials(p.name) }}</div>
                          <span :style="{ fontSize: '11px', fontWeight: 600, color: C.text, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }">{{ p.name }}</span>
                        </div>
                        <input
                          :style="{ ...sInput, borderColor: isBonusCorrect(p.id, b.id + '_' + (i - 1)) ? '#22c55e' : isBonusWrong(p.id, b.id + '_' + (i - 1)) ? '#ef444466' : C.border, background: isBonusCorrect(p.id, b.id + '_' + (i - 1)) ? 'rgba(34,197,94,0.08)' : '#1e293b', opacity: isMe(p.id) ? 1 : 0.6 }"
                          :placeholder="isMe(p.id) ? 'Mon pronostic...' : '—'"
                          :disabled="!isMe(p.id)"
                          :value="getBonusProno(p.id, b.id + '_' + (i - 1))"
                          @input="setBonus(p.id, b.id, i - 1, $event.target.value)" />
                        <span v-if="isBonusCorrect(p.id, b.id + '_' + (i - 1))" style="color: #22c55e; font-weight: 800; font-size: 12px; flex-shrink: 0; font-family: Anton, sans-serif; letter-spacing: 0.5px">+{{ b.points }}</span>
                        <span v-else-if="isBonusWrong(p.id, b.id + '_' + (i - 1))" style="color: #ef4444; font-size: 14px; flex-shrink: 0">✕</span>
                      </div>
                    </div>
                  </template>
                </div>
              </div>
            </div>

            <!-- TAB 3 — Classement -->
            <div v-if="tab === 3">
              <!-- Banner -->
              <div class="card-rel" :style="{ ...sCard, background: 'linear-gradient(135deg, #1e3a8a 0%, #7f1d1d 100%)', marginBottom: '16px', textAlign: 'center', padding: '22px 16px', border: '1px solid #f59e0b66' }">
                <div style="position: absolute; top: -10px; left: -10px; font-size: 60px; opacity: 0.12">★</div>
                <div style="position: absolute; bottom: -20px; right: -10px; font-size: 80px; opacity: 0.10">🏆</div>
                <div style="font-size: 36px; line-height: 1; margin-bottom: 6px">🏆</div>
                <div class="anton" style="font-size: 22px; color: #fbbf24; letter-spacing: 2px; margin-bottom: 4px">CLASSEMENT GÉNÉRAL</div>
                <div style="font-size: 11px; color: #fef3c7; letter-spacing: 1px">★ Mis à jour en direct · partagé avec tous ★</div>
              </div>

              <div v-if="rankings.length === 0" :style="{ ...sCard, color: C.muted, textAlign: 'center', padding: '40px' }">
                <div style="font-size: 32px; margin-bottom: 6px">🥁</div>
                Pas encore de participants.
              </div>

              <!-- Podium -->
              <div v-if="rankings.length >= 2">
                <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 10px">
                  <div class="ribbon" style="background: linear-gradient(180deg, #f59e0b, #b45309)">PODIUM</div>
                  <div :style="{ fontSize: '11px', color: C.muted }">The Goats</div>
                </div>
                <div class="podium">
                  <!-- 2nd -->
                  <div v-if="rankings[1]">
                    <div class="podium-step silver" style="height: 110px">
                      <div class="avatar-disc" :style="{ background: 'linear-gradient(135deg, ' + rankings[1].color + ', ' + rankings[1].color + 'cc)', margin: '0 auto 6px' }">{{ initials(rankings[1].name) }}</div>
                      <div class="medal">🥈</div>
                      <div class="p-name">{{ rankings[1].name }}</div>
                      <div class="pts" style="color: #cbd5e1">{{ rankings[1].total }}</div>
                      <div class="lbl">pts</div>
                    </div>
                    <div class="podium-base">2</div>
                  </div>
                  <div v-else></div>

                  <!-- 1st -->
                  <div>
                    <div class="podium-step gold" style="height: 140px">
                      <div style="position: absolute; top: -16px; left: 50%; transform: translateX(-50%); font-size: 26px">👑</div>
                      <div class="avatar-disc" :style="{ background: 'linear-gradient(135deg, ' + rankings[0].color + ', ' + rankings[0].color + 'cc)', margin: '0 auto 6px', width: '44px', height: '44px', fontSize: '18px' }">{{ initials(rankings[0].name) }}</div>
                      <div class="medal">🥇</div>
                      <div class="p-name" style="font-size: 16px">{{ rankings[0].name }}</div>
                      <div class="pts" style="font-size: 30px; color: #fbbf24">{{ rankings[0].total }}</div>
                      <div class="lbl">points</div>
                    </div>
                    <div class="podium-base" style="background: linear-gradient(180deg, #78350f, #451a03); border-color: #f59e0b; color: #fbbf24">1</div>
                  </div>

                  <!-- 3rd -->
                  <div v-if="rankings[2]">
                    <div class="podium-step bronze" style="height: 90px">
                      <div class="avatar-disc" :style="{ background: 'linear-gradient(135deg, ' + rankings[2].color + ', ' + rankings[2].color + 'cc)', margin: '0 auto 4px', width: '32px', height: '32px', fontSize: '13px' }">{{ initials(rankings[2].name) }}</div>
                      <div class="medal" style="font-size: 20px">🥉</div>
                      <div class="p-name">{{ rankings[2].name }}</div>
                      <div class="pts" style="font-size: 20px; color: #fb923c">{{ rankings[2].total }}</div>
                      <div class="lbl">pts</div>
                    </div>
                    <div class="podium-base">3</div>
                  </div>
                  <div v-else></div>
                </div>
              </div>

              <!-- Solo leader -->
              <div v-if="rankings.length === 1" class="card-rel" :style="{ ...sCard, background: 'linear-gradient(135deg, #78350f, #1c1507)', border: '1px solid #f59e0b66', padding: '20px', textAlign: 'center' }">
                <div style="font-size: 36px; margin-bottom: 4px">👑</div>
                <div class="anton" style="font-size: 18px; color: #fff; margin-bottom: 4px">{{ rankings[0].name }}</div>
                <div class="anton" style="font-size: 36px; color: #fbbf24; line-height: 1">{{ rankings[0].total }}</div>
                <div :style="{ fontSize: '10px', color: C.muted, letterSpacing: '1.5px', marginTop: '4px' }">POINTS · GOAT SOLO</div>
              </div>

              <!-- Positions 4+ -->
              <div v-if="rankings.length > 3" style="margin-top: 8px">
                <div :style="sLabel">★ Autres positions</div>
                <div v-for="(p, i) in rankings.slice(3)" :key="p.id" class="card-rel" :style="{ ...sCard, display: 'flex', alignItems: 'center', gap: '12px', padding: '10px' }">
                  <div class="anton" :style="{ fontSize: '18px', width: '30px', textAlign: 'center', color: C.muted }">#{{ i + 4 }}</div>
                  <div class="avatar-disc" :style="{ background: 'linear-gradient(135deg, ' + p.color + ', ' + p.color + 'cc)', width: '30px', height: '30px', fontSize: '12px' }">{{ initials(p.name) }}</div>
                  <div style="flex: 1">
                    <div class="anton" :style="{ fontSize: '14px', color: C.text }">{{ p.name }}</div>
                    <div :style="{ fontSize: '10px', color: C.muted, marginTop: '2px' }">🎯 {{ p.exactCount }} exact{{ p.exactCount > 1 ? 's' : '' }}</div>
                  </div>
                  <div style="text-align: right">
                    <div class="anton" :style="{ fontSize: '20px', color: C.text, lineHeight: 1 }">{{ p.total }}</div>
                    <div :style="{ fontSize: '9px', color: C.muted, letterSpacing: '1px' }">PTS</div>
                  </div>
                </div>
              </div>

              <!-- Stats table -->
              <div v-if="rankings.length > 1" :style="{ ...sCard, marginTop: '16px', background: '#0a0e1a', border: '1px solid #1e293b' }">
                <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 12px">
                  <div class="ribbon" style="background: linear-gradient(180deg, #1e3a8a, #1e293b)">STATS</div>
                  <div :style="{ fontSize: '11px', color: C.muted }">détail par joueur</div>
                </div>
                <table style="width: 100%; border-collapse: collapse; font-size: 12px">
                  <thead>
                    <tr :style="{ color: C.muted }">
                      <th style="text-align: left; padding: 6px; font-weight: 700; font-size: 10px; letter-spacing: 1px; text-transform: uppercase">Joueur</th>
                      <th style="text-align: center; padding: 6px; font-weight: 700; font-size: 10px; letter-spacing: 1px; text-transform: uppercase">Joués</th>
                      <th style="text-align: center; padding: 6px; font-weight: 700; font-size: 10px; letter-spacing: 1px; text-transform: uppercase">🎯</th>
                      <th style="text-align: center; padding: 6px; font-weight: 700; font-size: 10px; letter-spacing: 1px; text-transform: uppercase">Bonus</th>
                      <th style="text-align: right; padding: 6px; font-weight: 700; font-size: 10px; letter-spacing: 1px; text-transform: uppercase">Total</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr v-for="(p, i) in rankings" :key="p.id" :style="{ borderTop: '1px solid ' + C.border }">
                      <td style="padding: 8px 6px; font-weight: 700; font-family: Anton, sans-serif; letter-spacing: 0.5px">
                        <span :style="{ display: 'inline-block', width: '8px', height: '8px', borderRadius: '50%', background: p.color, marginRight: '6px' }"></span>
                        {{ p.name }}
                      </td>
                      <td :style="{ textAlign: 'center', padding: '8px 6px', color: C.muted }">{{ matchesPlayedCount() }}</td>
                      <td :style="{ textAlign: 'center', padding: '8px 6px', color: C.green, fontWeight: 700 }">{{ p.exactCount }}</td>
                      <td :style="{ textAlign: 'center', padding: '8px 6px', color: C.gold, fontWeight: 700 }">{{ (p.total - matchPtsForRanking(p.id)) > 0 ? '+' + (p.total - matchPtsForRanking(p.id)) : '–' }}</td>
                      <td :style="{ textAlign: 'right', padding: '8px 6px', fontFamily: 'Anton, sans-serif', fontSize: '14px', color: medalColors[i] || C.text }">{{ p.total }}</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>

          </div>
          </div><!-- /z-index wrapper -->
        </div>
      `
    }).mount('#app');
  </script>
</body>
</html>
