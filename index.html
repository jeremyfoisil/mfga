<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Make Football Goat Again 🐐</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0e1a; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0a0e1a; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    const { createApp, ref, computed, watch, onMounted } = Vue;

    const SUPABASE_URL  = "https://sazupuqxwrnvgzsdxkjg.supabase.co";
    const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNhenVwdXF4d3Judmd6c2R4a2pnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyNzc1MTEsImV4cCI6MjA5NDg1MzUxMX0.j2vQhrzFDDoaMV9i6CDIvF_9vpenDSFZ5julcjfXIBE";

    const GROUPS = [
      { id: "A", teams: ["Mexique", "Afrique du Sud", "Corée du Sud", "Rép. tchèque"] },
      { id: "B", teams: ["Canada", "Bosnie-Herzégovine", "Qatar", "Suisse"] },
      { id: "C", teams: ["Brésil", "Maroc", "Haïti", "Écosse"] },
      { id: "D", teams: ["États-Unis", "Paraguay", "Australie", "Turquie"] },
      { id: "E", teams: ["Allemagne", "Curaçao", "Côte d'Ivoire", "Équateur"] },
      { id: "F", teams: ["Pays-Bas", "Japon", "Suède", "Tunisie"] },
      { id: "G", teams: ["Belgique", "Égypte", "Iran", "Nouvelle-Zélande"] },
      { id: "H", teams: ["Espagne", "Cap-Vert", "Arabie Saoudite", "Uruguay"] },
      { id: "I", teams: ["France", "Sénégal", "Irak", "Norvège"] },
      { id: "J", teams: ["Argentine", "Algérie", "Autriche", "Jordanie"] },
      { id: "K", teams: ["Portugal", "RD Congo", "Ouzbékistan", "Colombie"] },
      { id: "L", teams: ["Angleterre", "Croatie", "Ghana", "Panama"] },
    ];

    const BONUS_TYPES = [
      { id: "winner",    label: "Vainqueur du tournoi",                     points: 10, count: 1 },
      { id: "finalist",  label: "Finalistes (les 2)",                       points: 5,  count: 2 },
      { id: "semi",      label: "Demi-finalistes (les 4)",                  points: 3,  count: 4 },
      { id: "topscorer", label: "Meilleur buteur",                          points: 5,  count: 1 },
      { id: "surprise",  label: "Meilleure surprise (hors top 10 en demi)", points: 7,  count: 1 },
      { id: "upset",     label: "Favori éliminé en groupes",                points: 6,  count: 1 },
    ];

    const TABS = ["Participants", "Matchs", "Bonus", "Classement"];

    const FLAG_EMOJIS = {
      "Mexique": "🇲🇽", "Afrique du Sud": "🇿🇦", "Corée du Sud": "🇰🇷", "Rép. tchèque": "🇨🇿",
      "Canada": "🇨🇦", "Bosnie-Herzégovine": "🇧🇦", "Qatar": "🇶🇦", "Suisse": "🇨🇭",
      "Brésil": "🇧🇷", "Maroc": "🇲🇦", "Haïti": "🇭🇹", "Écosse": "🏴󠁧󠁢󠁳󠁣󠁴󠁿",
      "États-Unis": "🇺🇸", "Paraguay": "🇵🇾", "Australie": "🇦🇺", "Turquie": "🇹🇷",
      "Allemagne": "🇩🇪", "Curaçao": "🇨🇼", "Côte d'Ivoire": "🇨🇮", "Équateur": "🇪🇨",
      "Pays-Bas": "🇳🇱", "Japon": "🇯🇵", "Suède": "🇸🇪", "Tunisie": "🇹🇳",
      "Belgique": "🇧🇪", "Égypte": "🇪🇬", "Iran": "🇮🇷", "Nouvelle-Zélande": "🇳🇿",
      "Espagne": "🇪🇸", "Cap-Vert": "🇨🇻", "Arabie Saoudite": "🇸🇦", "Uruguay": "🇺🇾",
      "France": "🇫🇷", "Sénégal": "🇸🇳", "Irak": "🇮🇶", "Norvège": "🇳🇴",
      "Argentine": "🇦🇷", "Algérie": "🇩🇿", "Autriche": "🇦🇹", "Jordanie": "🇯🇴",
      "Portugal": "🇵🇹", "RD Congo": "🇨🇩", "Ouzbékistan": "🇺🇿", "Colombie": "🇨🇴",
      "Angleterre": "🏴󠁧󠁢󠁥󠁮󠁧󠁿", "Croatie": "🇭🇷", "Ghana": "🇬🇭", "Panama": "🇵🇦",
    };

    const PARTICIPANT_COLORS = ["#e63946","#2a9d8f","#f4a261","#457b9d","#a8dadc","#e9c46a","#264653","#f77f00"];

    const C = {
      bg: "#0a0e1a", card: "#111827", border: "#1e293b", accent: "#3b82f6",
      gold: "#f59e0b", silver: "#94a3b8", bronze: "#cd7c2f",
      text: "#f1f5f9", muted: "#64748b", green: "#22c55e", yellow: "#eab308",
    };

    const medalColors = ["#f59e0b", "#94a3b8", "#cd7c2f"];
    const medalIcons  = ["🥇", "🥈", "🥉"];

    function getFlag(name) { return FLAG_EMOJIS[name] || "🏳️"; }

    function calcMatchPoints(prono, result) {
      if (!result || result.home === "" || result.away === "") return 0;
      if (!prono || prono.home === "" || prono.away === "") return 0;
      const ph = parseInt(prono.home), pa = parseInt(prono.away);
      const rh = parseInt(result.home), ra = parseInt(result.away);
      if (ph === rh && pa === ra) return 3;
      if (Math.sign(ph - pa) === Math.sign(rh - ra)) return 1;
      return 0;
    }

    function buildDefaultMatches() {
      const ms = []; let id = 1;
      GROUPS.forEach(g => {
        for (let i = 0; i < 4; i++)
          for (let j = i + 1; j < 4; j++)
            ms.push({ id: id++, group: g.id, home: g.teams[i], away: g.teams[j], result: { home: "", away: "" } });
      });
      return ms;
    }

    createApp({
      setup() {
        // ── Auth ──────────────────────────────────────────────────────────────
        const session      = ref(null);
        const profile      = ref(null);
        const authMode     = ref("login");
        const authUsername = ref("");
        const authPassword = ref("");
        const authError    = ref("");
        const authLoading  = ref(false);

        // ── App state ─────────────────────────────────────────────────────────
        const loaded            = ref(false);
        const saveMsg           = ref("");
        const rtStatus          = ref("connecting");
        const tab               = ref(0);
        const participants      = ref([]);
        const matches           = ref(buildDefaultMatches());
        const pronostics        = ref({});
        const bonusPronostics   = ref({});
        const bonusResults      = ref({});
        const jokers            = ref({});
        const activeGroup       = ref("A");
        const activeParticipant = ref(null);

        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
        const writeTimers = {};
        let realtimeChannel = null;

        // ── Permissions ───────────────────────────────────────────────────────
        const myParticipantId = computed(() => profile.value?.participant_id ?? null);
        const canEditProno    = computed(() => activeParticipant.value !== null && activeParticipant.value === myParticipantId.value);
        function isMe(pid) { return pid === myParticipantId.value; }

        // ── Computed ──────────────────────────────────────────────────────────
        const rtColor      = computed(() => rtStatus.value === "connected" ? C.green : C.yellow);
        const rtDot        = computed(() => rtStatus.value === "connected" ? "🟢" : "🟡");
        const groupMatches = computed(() => matches.value.filter(m => m.group === activeGroup.value));

        function calcScore(pid) {
          let total = 0, exactCount = 0;
          matches.value.forEach(m => {
            if (m.result.home === "" || m.result.away === "") return;
            const pts = calcMatchPoints(pronostics.value[pid]?.[m.id], m.result);
            if (pts === 3) exactCount++;
            total += jokers.value[pid] === m.id ? pts * 2 : pts;
          });
          BONUS_TYPES.forEach(b => {
            for (let i = 0; i < b.count; i++) {
              const key = `${b.id}_${i}`;
              const res = bonusResults.value[key], prono = bonusPronostics.value[pid]?.[key];
              if (res && prono && res.toLowerCase().trim() === prono.toLowerCase().trim()) total += b.points;
            }
          });
          return { total, exactCount };
        }

        const rankings = computed(() =>
          participants.value.map(p => ({ ...p, ...calcScore(p.id) }))
            .sort((a, b) => b.total - a.total || b.exactCount - a.exactCount)
        );

        // ── Style helpers ─────────────────────────────────────────────────────
        const sCard       = { background: C.card, border: `1px solid ${C.border}`, borderRadius: "12px", padding: "14px", marginBottom: "10px" };
        const sInput      = { background: "#1e293b", border: `1px solid ${C.border}`, borderRadius: "8px", color: C.text, padding: "8px 12px", fontFamily: "'Syne', sans-serif", fontSize: "13px", outline: "none", width: "100%" };
        const sScoreInput = { background: "#1e293b", border: `1px solid ${C.border}`, borderRadius: "6px", color: C.text, padding: "6px 0", fontFamily: "'Syne', sans-serif", fontSize: "15px", fontWeight: 700, textAlign: "center", width: "44px", outline: "none" };
        const sLabel      = { color: C.muted, fontSize: "11px", fontWeight: 600, textTransform: "uppercase", letterSpacing: "1px", marginBottom: "6px", display: "block" };

        function tabStyle(active) {
          return { padding: "10px 16px", background: active ? C.accent : "transparent", color: active ? "#fff" : C.muted, border: "none", borderRadius: "8px 8px 0 0", cursor: "pointer", fontFamily: "'Syne', sans-serif", fontWeight: 600, fontSize: "13px" };
        }
        function btnStyle(color) {
          return { background: color || C.accent, color: "#fff", border: "none", borderRadius: "8px", padding: "8px 16px", cursor: "pointer", fontFamily: "'Syne', sans-serif", fontWeight: 700, fontSize: "13px" };
        }
        function badgeStyle(color) {
          return { background: color + "22", color, border: `1px solid ${color}44`, borderRadius: "6px", padding: "2px 8px", fontSize: "12px", fontWeight: 700 };
        }
        function groupBtnStyle(active) {
          return { padding: "6px 11px", background: active ? C.accent : "#1e293b", color: active ? "#fff" : C.muted, border: `1px solid ${active ? C.accent : C.border}`, borderRadius: "8px", cursor: "pointer", fontFamily: "'Syne', sans-serif", fontWeight: 600, fontSize: "12px" };
        }
        function pBtnStyle(active, color) {
          return { padding: "6px 13px", background: active ? color : "#1e293b", color: active ? "#fff" : C.muted, border: `1px solid ${active ? color : C.border}`, borderRadius: "20px", cursor: "pointer", fontFamily: "'Syne', sans-serif", fontWeight: 600, fontSize: "12px" };
        }

        // ── Template helpers ──────────────────────────────────────────────────
        function getProno(pid, matchId)     { return pronostics.value[pid]?.[matchId] || {}; }
        function isJokerMatch(pid, matchId) { return jokers.value[pid] === matchId; }
        function getMatchPts(pid, matchId) {
          const m = matches.value.find(x => x.id === matchId);
          return m ? calcMatchPoints(pronostics.value[pid]?.[m.id], m.result) : 0;
        }
        function ptColor(pts, hasRes) {
          return pts === 3 ? C.green : pts === 1 ? C.yellow : hasRes ? "#ef4444" : C.muted;
        }
        function getBonusProno(pid, key)    { return bonusPronostics.value[pid]?.[key] || ""; }
        function isBonusCorrect(pid, key) {
          const res = bonusResults.value[key], prono = bonusPronostics.value[pid]?.[key];
          return !!(res && prono && res.toLowerCase().trim() === prono.toLowerCase().trim());
        }
        function matchPtsForRanking(pid) {
          return matches.value.reduce((acc, m) => {
            if (m.result.home === "" || m.result.away === "") return acc;
            const pts = calcMatchPoints(pronostics.value[pid]?.[m.id], m.result);
            return acc + (jokers.value[pid] === m.id ? pts * 2 : pts);
          }, 0);
        }
        function matchesPlayedCount() {
          return matches.value.filter(m => m.result.home !== "" && m.result.away !== "").length;
        }
        function activeParticipantName() {
          return participants.value.find(p => p.id === activeParticipant.value)?.name || "";
        }

        // ── Flash / debounce ──────────────────────────────────────────────────
        function flash() { saveMsg.value = "✓ Sauvegardé"; setTimeout(() => { saveMsg.value = ""; }, 2000); }
        function debounce(key, fn, delay = 600) {
          if (writeTimers[key]) clearTimeout(writeTimers[key]);
          writeTimers[key] = setTimeout(async () => { await fn(); flash(); }, delay);
        }

        // ── Data actions ──────────────────────────────────────────────────────
        function setMatchResult(matchId, side, val) {
          matches.value = matches.value.map(m => m.id !== matchId ? m : { ...m, result: { ...m.result, [side]: val } });
          debounce(`mr_${matchId}`, async () => {
            const m = matches.value.find(x => x.id === matchId);
            if (!m) return;
            await sb.from("match_results").upsert({
              match_id: matchId,
              result_home: m.result.home === "" ? null : parseInt(m.result.home),
              result_away: m.result.away === "" ? null : parseInt(m.result.away),
            }, { onConflict: "match_id" });
          });
        }

        function setProno(pid, matchId, side, val) {
          if (!isMe(pid)) return;
          const cur = pronostics.value;
          pronostics.value = { ...cur, [pid]: { ...cur[pid], [matchId]: { ...(cur[pid]?.[matchId] || {}), [side]: val } } };
          debounce(`prono_${pid}_${matchId}`, async () => {
            const prono = pronostics.value[pid]?.[matchId];
            if (!prono) return;
            await sb.from("pronostics").upsert({
              participant_id: pid, match_id: matchId,
              prono_home: prono.home === "" ? null : parseInt(prono.home),
              prono_away: prono.away === "" ? null : parseInt(prono.away),
              is_joker: jokers.value[pid] === matchId,
            }, { onConflict: "participant_id,match_id" });
          });
        }

        function setBonus(pid, bonusId, idx, val) {
          if (!isMe(pid)) return;
          const key = `${bonusId}_${idx}`;
          bonusPronostics.value = { ...bonusPronostics.value, [pid]: { ...bonusPronostics.value[pid], [key]: val } };
          debounce(`bp_${pid}_${key}`, async () => {
            await sb.from("bonus_pronostics").upsert(
              { participant_id: pid, bonus_key: key, value: val },
              { onConflict: "participant_id,bonus_key" }
            );
          });
        }

        function setBonusResult(bonusId, idx, val) {
          const key = `${bonusId}_${idx}`;
          bonusResults.value = { ...bonusResults.value, [key]: val };
          debounce(`br_${key}`, async () => {
            await sb.from("bonus_results").upsert({ bonus_key: key, value: val }, { onConflict: "bonus_key" });
          });
        }

        async function toggleJoker(pid, matchId) {
          if (!isMe(pid)) return;
          const isCurrentJoker = jokers.value[pid] === matchId;
          const oldJokerMatchId = jokers.value[pid];
          jokers.value = { ...jokers.value, [pid]: isCurrentJoker ? null : matchId };

          if (oldJokerMatchId && oldJokerMatchId !== matchId) {
            const oldProno = pronostics.value[pid]?.[oldJokerMatchId] || {};
            await sb.from("pronostics").upsert({
              participant_id: pid, match_id: oldJokerMatchId,
              prono_home: oldProno.home === "" ? null : parseInt(oldProno.home),
              prono_away: oldProno.away === "" ? null : parseInt(oldProno.away),
              is_joker: false,
            }, { onConflict: "participant_id,match_id" });
          }

          const prono = pronostics.value[pid]?.[matchId] || {};
          await sb.from("pronostics").upsert({
            participant_id: pid, match_id: matchId,
            prono_home: prono.home === "" ? null : parseInt(prono.home),
            prono_away: prono.away === "" ? null : parseInt(prono.away),
            is_joker: !isCurrentJoker,
          }, { onConflict: "participant_id,match_id" });
          flash();
        }

        // ── Auth actions ──────────────────────────────────────────────────────
        async function doRegister() {
          authLoading.value = true;
          authError.value = "";
          try {
            const username = authUsername.value.trim().toLowerCase().replace(/[^a-z0-9_]/g, "");
            if (username.length < 2) throw new Error("Le nom doit faire au moins 2 caractères (lettres, chiffres, _)");
            if (authPassword.value.length < 6) throw new Error("Le mot de passe doit faire au moins 6 caractères");
            const { data, error } = await sb.auth.signUp({ email: `${username}@mfga.app`, password: authPassword.value });
            if (error) {
              if (error.message.includes("already registered") || error.message.includes("already exists"))
                throw new Error("Ce nom d'utilisateur est déjà pris");
              if (error.message.includes("rate limit"))
                throw new Error("Trop de tentatives, réessayez dans quelques minutes");
              throw error;
            }
            if (data.user && !data.session)
              throw new Error("Confirmez votre email avant de vous connecter (ou désactivez la confirmation email dans Supabase)");
          } catch (e) {
            authError.value = e.message;
          } finally {
            authLoading.value = false;
          }
        }

        async function doLogin() {
          authLoading.value = true;
          authError.value = "";
          try {
            const username = authUsername.value.trim().toLowerCase().replace(/[^a-z0-9_]/g, "");
            const { error } = await sb.auth.signInWithPassword({ email: `${username}@mfga.app`, password: authPassword.value });
            if (error) throw new Error("Nom d'utilisateur ou mot de passe incorrect");
          } catch (e) {
            authError.value = e.message;
          } finally {
            authLoading.value = false;
          }
        }

        async function doLogout() {
          if (realtimeChannel) { sb.removeChannel(realtimeChannel); realtimeChannel = null; }
          await sb.auth.signOut();
          session.value = null;
          profile.value = null;
          loaded.value = false;
          participants.value = [];
          pronostics.value = {};
          bonusPronostics.value = {};
          bonusResults.value = {};
          jokers.value = {};
          matches.value = buildDefaultMatches();
          tab.value = 0;
          authUsername.value = "";
          authPassword.value = "";
        }

        // ── Data loading ──────────────────────────────────────────────────────
        async function loadData(userId) {
          // Fetch profile (with retry in case trigger hasn't completed yet)
          let { data: prof } = await sb.from("profiles").select("*").eq("id", userId).single();
          if (!prof) {
            await new Promise(r => setTimeout(r, 900));
            const { data: retry } = await sb.from("profiles").select("*").eq("id", userId).single();
            prof = retry;
          }
          if (!prof) { authError.value = "Profil introuvable. Contactez l'administrateur."; return; }
          profile.value = prof;

          const [{ data: pData }, { data: mrData }, { data: prData }, { data: brData }, { data: bpData }] = await Promise.all([
            sb.from("participants").select("*").order("id"),
            sb.from("match_results").select("*"),
            sb.from("pronostics").select("*"),
            sb.from("bonus_results").select("*"),
            sb.from("bonus_pronostics").select("*"),
          ]);

          participants.value = (pData || []).map(p => ({ id: p.id, name: p.name, color: p.color }));
          activeParticipant.value = prof.participant_id;

          const resultMap = {};
          (mrData || []).forEach(r => { resultMap[r.match_id] = { home: r.result_home !== null ? String(r.result_home) : "", away: r.result_away !== null ? String(r.result_away) : "" }; });
          matches.value = buildDefaultMatches().map(m => ({ ...m, result: resultMap[m.id] || { home: "", away: "" } }));

          const pronos = {}, jkrs = {};
          (prData || []).forEach(p => {
            if (!pronos[p.participant_id]) pronos[p.participant_id] = {};
            pronos[p.participant_id][p.match_id] = { home: p.prono_home !== null ? String(p.prono_home) : "", away: p.prono_away !== null ? String(p.prono_away) : "" };
            if (p.is_joker) jkrs[p.participant_id] = p.match_id;
          });
          pronostics.value = pronos;
          jokers.value = jkrs;

          const bRes = {};
          (brData || []).forEach(r => { bRes[r.bonus_key] = r.value; });
          bonusResults.value = bRes;

          const bPronos = {};
          (bpData || []).forEach(p => {
            if (!bPronos[p.participant_id]) bPronos[p.participant_id] = {};
            bPronos[p.participant_id][p.bonus_key] = p.value;
          });
          bonusPronostics.value = bPronos;

          loaded.value = true;

          if (realtimeChannel) sb.removeChannel(realtimeChannel);
          realtimeChannel = sb.channel("mfga-rt")
            .on("postgres_changes", { event: "*", schema: "public", table: "participants" }, ({ eventType, new: n, old: o }) => {
              if (eventType === "INSERT") participants.value = participants.value.find(x => x.id === n.id) ? participants.value : [...participants.value, { id: n.id, name: n.name, color: n.color }];
              else if (eventType === "DELETE") participants.value = participants.value.filter(x => x.id !== o.id);
            })
            .on("postgres_changes", { event: "*", schema: "public", table: "match_results" }, ({ eventType, new: r }) => {
              if (eventType === "INSERT" || eventType === "UPDATE")
                matches.value = matches.value.map(m => m.id === r.match_id ? { ...m, result: { home: r.result_home !== null ? String(r.result_home) : "", away: r.result_away !== null ? String(r.result_away) : "" } } : m);
            })
            .on("postgres_changes", { event: "*", schema: "public", table: "pronostics" }, ({ eventType, new: p }) => {
              if (eventType === "INSERT" || eventType === "UPDATE") {
                pronostics.value = { ...pronostics.value, [p.participant_id]: { ...pronostics.value[p.participant_id], [p.match_id]: { home: p.prono_home !== null ? String(p.prono_home) : "", away: p.prono_away !== null ? String(p.prono_away) : "" } } };
                jokers.value = (() => { const j = { ...jokers.value }; if (p.is_joker) j[p.participant_id] = p.match_id; else if (j[p.participant_id] === p.match_id) j[p.participant_id] = null; return j; })();
              }
            })
            .on("postgres_changes", { event: "*", schema: "public", table: "bonus_results" }, ({ eventType, new: r }) => {
              if (eventType === "INSERT" || eventType === "UPDATE") bonusResults.value = { ...bonusResults.value, [r.bonus_key]: r.value };
            })
            .on("postgres_changes", { event: "*", schema: "public", table: "bonus_pronostics" }, ({ eventType, new: p }) => {
              if (eventType === "INSERT" || eventType === "UPDATE") bonusPronostics.value = { ...bonusPronostics.value, [p.participant_id]: { ...bonusPronostics.value[p.participant_id], [p.bonus_key]: p.value } };
            })
            .subscribe(status => { rtStatus.value = status === "SUBSCRIBED" ? "connected" : "connecting"; });
        }

        // ── Session listener ──────────────────────────────────────────────────
        onMounted(() => {
          sb.auth.onAuthStateChange(async (event, newSession) => {
            session.value = newSession;
            if (newSession && (event === "SIGNED_IN" || event === "INITIAL_SESSION") && !loaded.value) {
              await loadData(newSession.user.id);
            } else if (event === "SIGNED_OUT") {
              loaded.value = false;
            }
          });
        });

        watch(authMode, () => { authError.value = ""; });

        return {
          session, profile, authMode, authUsername, authPassword, authError, authLoading,
          doRegister, doLogin, doLogout,
          loaded, saveMsg, rtStatus, tab, participants, matches, pronostics,
          bonusPronostics, bonusResults, jokers, activeGroup, activeParticipant,
          myParticipantId, canEditProno, isMe,
